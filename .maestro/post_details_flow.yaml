# Post Details is reached via Home -> tapping a friend-post card. See
# home_smoke.yaml for the login-credential override instructions.
#
# Uses Jasmine Reyes's seeded post (index 0 in sample_feed.dart), which
# already has 2 comments, so the empty-state text isn't in play.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Jasmine Reyes"
- assertVisible: "Miguel Ibarra"
- assertVisible: "That sunrise shot is unreal, where exactly is this?"
- tapOn: "Write a comment..."
- inputText: "Great shot!"
- tapOn: "Send comment"
- assertVisible: "Great shot!"
