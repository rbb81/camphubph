# Camp Details is reached via Discover -> a category -> a camp result card.
# See discover_smoke.yaml for the login-credential override instructions.
#
# Uses "Batangas Ridge" (Mountains category, no seeded reviews or message
# thread) so "Message Campsite" starts a brand-new empty conversation.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Discover"
- tapOn: "Mountains"
- tapOn: "Batangas Ridge"
- tapOn: "Message Campsite"
- assertVisible: "No messages yet. Say hello!"
- tapOn: "Type a message"
- inputText: "Is there a covered area in case it rains?"
- tapOn: "Send message"
- assertVisible: "Is there a covered area in case it rains?"
