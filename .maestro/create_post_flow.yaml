# Create Post is reached via Home -> the "+" FAB (tooltip "Create post").
# See home_smoke.yaml for the login-credential override instructions.
#
# Skips the photo picker — it opens the real native gallery UI, which isn't
# reliably drivable in an automated flow (see create_post_screen_test.dart,
# which likewise never exercises image_picker directly).
#
# The "^Post$" taps are regex-anchored for an exact match — "Post" alone
# would also partially match this screen's own "Create Post" AppBar title
# (Maestro's plain-string text selector partial-matches by default).
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Create post"
- assertVisible: "Create Post"
- tapOn: "^Post$"
- assertVisible: "Write something to post."
- tapOn: "What's happening on your trip?"
- inputText: "Testing the trail conditions after last night's rain."
- tapOn: "Location (optional)"
- inputText: "Mt. Daraitan"
- tapOn: "^Post$"
- assertVisible: "Testing the trail conditions after last night's rain."
