# Create Community is reached via Communities -> the "+" FAB. See
# home_smoke.yaml for the login-credential override instructions.
#
# The "^Create$" taps are regex-anchored for an exact match — "Create" alone
# would also partially match this screen's own "Create Community" AppBar
# title (Maestro's plain-string text selector partial-matches by default).
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Communities"
- tapOn: "Create community"
- assertVisible: "Create Community"
- tapOn: "^Create$"
- assertVisible: "Give your community a name."
- assertVisible: "Describe what this community is about."
- tapOn: "Name"
- inputText: "Maestro Testers PH"
- tapOn: "Description"
- inputText: "A community created by an automated test flow."
- tapOn: "Private"
- assertVisible: "Only people you approve can join and see posts."
- tapOn: "Public"
- tapOn: "^Create$"
- assertVisible: "Maestro Testers PH"
