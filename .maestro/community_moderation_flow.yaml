# Moderator-only actions on Community Feed: remove post, remove comment,
# ban member. See home_smoke.yaml for the login-credential override
# instructions.
#
# Uses "Bicol Volcano Trekkers" — the current user (Ana Dela Cruz) is
# pre-seeded as its moderator (see pending_join_requests.yaml's precedent
# for reusing this same community). Its one seeded post ("Permit lines at
# the Mayon...") has one comment and is authored by a different member
# ("Rico P.") so removal reads as real moderation, not self-cleanup.
#
# Icon-only buttons are targeted by their tooltips (`Remove post`,
# `Remove comment`, `Ban member`) — same convention as every other
# icon-only control in this app's Maestro flows.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Communities"
- tapOn: "Bicol Volcano Trekkers"
- assertVisible: "Permit lines at the Mayon ranger station"
- tapOn: "Remove post"
- tapOn: "Yes, Remove"
- assertNotVisible: "Permit lines at the Mayon ranger station"
- tapOn: "Members"
- assertVisible: "Rico P."
- tapOn: "Ban member"
- tapOn: "Yes, Ban"
- assertNotVisible: "Rico P."
