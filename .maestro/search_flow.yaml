# Search is only reachable after logging in, via the search icon in Home's
# app bar. The icon itself has no visible text, so it's targeted by its
# tooltip ("Search") — same convention as the other icon-only buttons in
# this app (see map_smoke.yaml's pin-tooltip comment for the same caveat):
# whether Maestro's text matcher picks up a Tooltip's semantics label is
# unverified in this environment (no emulator available).
#   maestro test .maestro/search_flow.yaml
# If the app was built WITH real Supabase credentials, override with a
# pre-existing, email-confirmed test account instead:
#   maestro test -e MAESTRO_TEST_EMAIL=you@example.com -e MAESTRO_TEST_PASSWORD=yourpassword .maestro/search_flow.yaml
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "^Search$"
- tapOn: "Search camps, communities, people, locations, activities"
- inputText: "Daraitan"
- assertVisible: "Mt. Daraitan campsite"
- tapOn: "Mt. Daraitan campsite"
- assertVisible: "Overview"
