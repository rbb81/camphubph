# Home is only reachable after logging in — see home_smoke.yaml for the
# login-credential override instructions.
#
# "Follow" is anchored (^Follow$) since a plain-string match would also hit
# "Requested"/"Following" text once the button's label changes — same
# partial/regex-match gotcha documented in the other Maestro flows in this
# repo. Maestro's tapOn auto-scrolls to find its target, so no explicit
# scroll step is needed to reach the suggested-user card below the fold.
#
# Also checks the Reviews tab, since Ate Baby has a seeded review
# (chateau-glamp) but no seeded posts.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "^Follow$"
- assertVisible: "Requested"
- assertVisible: "Follow request sent to Ate Baby"
- tapOn: "Ate Baby"
- assertVisible: "Expert camper"
- tapOn: "Reviews"
- assertVisible: "Chateau du Mer glamping"
- tapOn: "Message"
- assertVisible: "No messages yet. Say hello!"
- tapOn: "Type a message"
- inputText: "Hey, love your trail updates!"
- tapOn: "Send message"
- assertVisible: "Hey, love your trail updates!"
