# Works either way: if the app was built without --dart-define-from-file,
# this exercises the dummy auth fallback (always succeeds); if built with
# real Supabase credentials, it exercises an actual signUp call. Either way
# the app lands on the same "Check your email" state.
appId: com.camphubph.camper
---
- launchApp
- tapOn: "Create your account"
- tapOn: "Jasmine Reyes"
- inputText: "Maestro Test"
- tapOn: "name@example.com"
- inputText: "maestro-test@example.com"
- tapOn: "At least 8 characters"
- inputText: "password123"
- tapOn: "Re-enter your password"
- inputText: "password123"
- tapOn: "I agree to the terms of service and privacy policy."
- tapOn: "Create account"
- assertVisible: "Check your email"
