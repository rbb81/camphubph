# Trip Planner is reached via Profile -> "Trip Planner". See
# home_smoke.yaml for the login-credential override instructions.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Profile"
- tapOn: "Trip Planner"
- assertVisible: "Trip Planner"
- assertVisible: "Upcoming"
- assertVisible: "Mt. Daraitan campsite"
- assertVisible: "Past"
- assertVisible: "Taal Lake shoreline"
