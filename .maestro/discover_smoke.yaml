# Discover is only reachable after logging in. If the app was built WITHOUT
# --dart-define-from-file, the dummy auth fallback accepts any credentials,
# so the defaults below just work:
#   maestro test .maestro/discover_smoke.yaml
# If the app was built WITH real Supabase credentials, override with a
# pre-existing, email-confirmed test account instead:
#   maestro test -e MAESTRO_TEST_EMAIL=you@example.com -e MAESTRO_TEST_PASSWORD=yourpassword .maestro/discover_smoke.yaml
#
# Uses the "Rivers" category, which has exactly one sample camp
# (Pagsanjan River camp), so the results-screen assertion is unambiguous.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Discover"
- assertVisible: "Discover"
- assertVisible: "Mountains"
- assertVisible: "Rivers"
- tapOn: "Rivers"
- assertVisible: "Pagsanjan River camp"
- assertVisible: "Pagsanjan, Laguna"
