# Followers/Following are reached from Profile's stat taps, which itself
# requires login — see profile_smoke.yaml for the login-credential override
# instructions, same dummy-auth defaults apply here.
#
# "Followers"/"Following" tap targets are the _StatColumn label text (the
# whole column, count + label, is wrapped in one InkWell) rather than a
# widget key, matching this repo's usual text-based Maestro taps.
#
# Multiple followers are seeded notFollowing, so "Follow Back" matches more
# than one button — `index: 0` picks Jasmine Reyes specifically (first in
# sample_other_users.dart / the Followers list), same index-disambiguation
# convention as login_validation.yaml's "Log in" (index: 1).
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Profile"
- tapOn: "Followers"
- assertVisible: "Jasmine Reyes"
- tapOn:
    text: "Follow Back"
    index: 0
- assertVisible: "Requested"
- assertVisible: "Following"
- back
- tapOn: "Following"
- assertVisible: "Jasmine Reyes"
