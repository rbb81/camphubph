# Map is reached from Home's bottom nav bar. See home_smoke.yaml for the
# login-credential override instructions.
#
# Markers are icon-only (no visible text), so this targets a specific pin
# by its Tooltip label ("Mt. Daraitan campsite") — Flutter exposes a
# Tooltip's message as a distinct semantics "tooltip" field (not the usual
# text/content-desc/label), so whether Maestro's text matcher picks it up
# is unverified here (no emulator available in this environment, same
# standing limitation as every other flow in this folder). If this step
# fails on a real device, fall back to a coordinate-based tapOn for the
# marker instead.
appId: com.camphubph.camper
env:
  MAESTRO_TEST_EMAIL: dummy@example.com
  MAESTRO_TEST_PASSWORD: dummy-password
---
- launchApp
- tapOn: "Log in"
- tapOn: "name@example.com"
- inputText: ${MAESTRO_TEST_EMAIL}
- tapOn: "Your password"
- inputText: ${MAESTRO_TEST_PASSWORD}
- tapOn:
    text: "Log in"
    index: 1
- tapOn: "Map"
- assertVisible: "Map"
- tapOn: "Mt. Daraitan campsite"
- assertVisible: "Tanay, Rizal"
- assertVisible: "View Details"
- tapOn: "View Details"
- assertVisible: "Overview"
